syntax = "proto3";

package sdk.v1;

import "google/protobuf/struct.proto";

option csharp_namespace = "Cursor.Sdk.V1";
option go_package = "github.com/anysphere/everysphere/anygo/proto/sdk/v1";
option java_multiple_files = true;
option java_package = "com.cursor.sdk.v1";
option ruby_package = "Cursor::Sdk::V1";
option swift_prefix = "CursorSdkV1";

// Store callbacks from the Node bridge to a Python (or other) host process.
//
// The bridge forwards local-agent-store operations to the host over a single
// generic `CallStore` RPC, mirroring the `@cursor/sdk` `LocalAgentStore`
// topology (substores: agents, runs, runEvents, checkpoints). Inputs/outputs
// are structured JSON so the bridge can forward the full surface without a
// typed message per operation. This powers `local.store` type "custom", where
// every substore is implemented by the host process.
service SdkStoreCallbackService {
  rpc CallStore(CallStoreRequest) returns (CallStoreResponse);
}

// Generic LocalAgentStore operation forwarded to a host-owned substore.
message CallStoreRequest {
  // Substore being addressed: "agents", "runs", "runEvents", or "checkpoints".
  string substore = 1;
  // Operation on the substore: "get", "create", "update", "delete", "list", or
  // "append" (runEvents only).
  string method = 2;
  // Operation input object. Checkpoint blob bytes are base64 strings.
  google.protobuf.Struct input = 3;
}

message CallStoreResponse {
  // Operation output object, or unset for a null result (e.g. a `get` miss or
  // a `delete`). Checkpoint blob bytes are base64 strings.
  google.protobuf.Struct output = 1;
}
