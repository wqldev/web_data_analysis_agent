<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent 数据分析</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand"> 
        <span class="logo">◈</span>
        <div>
          <h1>AI Agent 数据分析</h1>
          <p class="subtitle">配置 API key, 输入问题, 开始分析</p>
        </div>
      </div>
      <button id="adminBtn" class="btn btn-ghost" type="button">管理员配置</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>历史记录</h2>
          <button id="refreshHistory" class="btn btn-ghost btn-sm" type="button">刷新</button>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </aside>

      <section class="main-panel">
        <div class="query-card">
          <label for="questionInput">输入分析问题</label>
          <div class="query-row">
            <input
              id="questionInput"
              type="text"
              placeholder="例如：近半年销售情况怎么样？"
              autocomplete="off"
            />
            <button id="submitBtn" class="btn btn-primary" type="button">确定</button>
          </div>
        <p class="hint">支持趋势、对比、归因、假设等分析类问题。</p>
      </div>

      <div id="generalAnswer" class="general-answer hidden">
        <div class="general-answer-head">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>回答</span>
          <button id="clearGeneralAnswer" class="btn-close-general" title="关闭">✕</button>
        </div>
        <div id="generalAnswerContent" class="general-answer-content markdown-body"></div>
      </div>

      <div id="progressPanel" class="progress-panel hidden">
          <div class="progress-steps">
            <div class="step" data-step="planning">
              <span class="step-dot"></span>
              <span class="step-label">规划中</span>
            </div>
            <div class="step-line"></div>
            <div class="step" data-step="building">
              <span class="step-dot"></span>
              <span class="step-label">正在分析ing</span>
            </div>
            <div class="step-line"></div>
            <div class="step" data-step="verifying">
              <span class="step-dot"></span>
              <span class="step-label">验收中</span>
            </div>
          </div>
          <p id="progressDetail" class="progress-detail">准备中…</p>
        </div>

        <div id="reportPanel" class="report-panel hidden">
          <div class="report-head">
            <h2 id="reportTitle">分析报告</h2>
            <span id="reportBadge" class="badge"></span>
          </div>
          <article id="reportContent" class="report-content markdown-body"></article>
        </div>

        <div id="emptyState" class="empty-state">
          <p>输入问题开始分析，或从左侧选择历史记录查看报告。</p>
        </div>
      </section>
    </main>
  </div>

  <dialog id="adminDialog" class="admin-dialog">
    <form id="adminForm" method="dialog">
      <h2>模型配置</h2>
      <p class="admin-hint">
        配置 OpenAI 兼容的 API 服务，支持任何兼容的 LLM 提供商（如 OpenAI、DeepSeek、通义千问等）。
      </p>
      <div class="form-grid">
        <label class="span-2">API 地址
          <input name="api_base" type="text" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1" />
        </label>
        <label class="span-2">API Key
          <input name="api_key" type="password" placeholder="留空则保持原 Key" autocomplete="off" />
        </label>
        <label class="span-2">模型名称
          <input name="model" type="text" value="gpt-4o" placeholder="gpt-4o" />
        </label>
      </div>
      <div class="dialog-actions">
        <button type="button" id="testConnBtn" class="btn btn-ghost">测试数据库</button>
        <button type="button" id="testKeyBtn" class="btn btn-ghost">测试 API</button>
        <button type="button" id="cancelAdmin" class="btn btn-ghost">取消</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
      <p id="adminMsg" class="admin-msg"></p>
    </form>
  </dialog>

  <dialog id="completeDialog" class="complete-dialog">
    <div id="completeIcon" class="complete-icon success">✓</div>
    <h2 id="completeTitle">分析完成</h2>
    <p id="completeMessage" class="complete-message">报告已生成，验收通过。</p>
    <div class="dialog-actions">
      <button type="button" id="completeOkBtn" class="btn btn-primary">查看报告</button>
    </div>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
